site_name: llming-stage
site_description: Shared frontend foundation and SPA app shell for the llming ecosystem
site_url: https://alyxion.github.io/llming-stage
repo_url: https://github.com/Alyxion/llming-stage
repo_name: Alyxion/llming-stage

# Markdown source lives in docs/content/; the rendered site is written
# to ../site/ (kept out of version control via .gitignore) so build
# artefacts never collide with content.
docs_dir: content
site_dir: ../site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Stage apps: stage.md
  - App shell: shell.md
  - Communication model: communication-model.md
  - llming-com integration: llming-com.md
  - Assets: assets.md
  - Lazy loading: lazy-loading.md
  - Security: security.md
  - API reference: api.md
